<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "utf-8">
        <style>
            th,td{border:1px solid black;}
        </style>
        <title>Week 4 Notes</title>
    </head>
    <body>
        <h1>Tables and Forms Day</h1>
            <h2>Tables</h2>
                <table>
                    <caption>World Populations</caption>
                    <tr> <!-- Stands for the table row -->
                        <th>Country</th> <!-- th stands for a table heading -->
                        <th>Population</th>
                        <th>% of Population</th>
                    </tr>
                    <tr>
                        <td>China</td> <!-- td dtands for table data -->
                        <td>1,403,830,640</td>
                        <td>18%</td>
                    </tr>
                    <tr>
                        <td>India</td>
                        <td>1,345,683,123</td>
                        <td>17.5%</td>
                    </tr>
                    <tr>
                        <td>United States</td>
                        <td>333,834,778</td>
                        <td>4.5%</td>
                    </tr>
                </table>
            <h2>Forms</h2>
                <form action = "" method = "post"> <!-- Post sends form data on the back end -->
                    <label  for ="fullname">Full Name:</label><br> <!-- for value must match id value to link label and input -->
                    <input type = "text" id = "fullname" name = "fullname"><br>
                    <label for = "instructions">Special Instructions:</label><br>
                    <textarea id = "instructions" name = "instructions"></textarea><br>
                    <p>Choose a Delivery Method:</p>
                    <input type = "radio" id = "pickup" name = "pickupdelivery"> <!-- Value in name hooks the radio buttons together -->
                    <label for = "pickup">Pickup</label><br>
                    <input type = "radio" id = "delivery" name = "pickupdelivery">
                    <label for = "delivery">Delivery</label>
                    <p>Do you want extra sauce?</p>
                    <input type = "checkbox" id = "extra" name = "extra" value = "yes">
                    <label for = "extra">Yes</label><br><br>
                    <label for = "neighborhood">Neighborhood</label><br>
                    <select id = "neighborhood" name = "neighborhood">
                        <option></option>
                        <option value = "Westcott">Westcott</option>
                        <option value = "Downtown">Downtown</option>
                        <option value = "Eastwood">Eastwood</option>
                    </select><br><br>
                    <input type ="submit" value = "Send Form">
                    <!-- Most form elements are inline meaning no forwarding to next line, no margins around-->
                </form>
    </body>


</html>
